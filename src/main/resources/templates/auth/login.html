<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SnapDog Admin</title>

    <script src="/js/tailwind.js"></script>
    <link rel="stylesheet" href="/style/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'snapdog': {
                            50: '#fef2f2',
                            100: '#fee2e2',
                            200: '#fecaca',
                            300: '#fca5a5',
                            400: '#f87171',
                            500: '#ef4444',
                            600: '#dc2626',
                            700: '#b91c1c',
                            800: '#991b1b',
                            900: '#7f1d1d',
                            950: '#450a0a',
                        }
                    }
                }
            }
        }
    </script>

    <script src="/js/lucide.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">

        <div class="bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden">

            <div class="bg-snapdog-600 px-8 py-6 text-center">
                <div class="flex items-center justify-center gap-3 mb-2">
                    <div class="w-12 h-12 bg-white rounded-lg flex items-center justify-center">
                        <span class="text-snapdog-600 font-bold text-2xl">🌭</span>
                    </div>
                    <div class="text-left">
                        <h1 class="font-bold text-xl text-white leading-tight">SnapDog</h1>
                        <span class="text-snapdog-200 text-sm">Delivery Admin</span>
                    </div>
                </div>
            </div>

            <div class="px-8 py-8">
                <h2 class="text-xl font-semibold text-gray-800 mb-6 text-center">Acesse sua conta</h2>

                <div th:if="${error}" class="mb-6 p-4 rounded-lg bg-red-50 border border-red-200 text-red-700 flex items-center gap-3">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i>
                    <span th:text="${error}"></span>
                </div>

                <div th:if="${message}" class="mb-6 p-4 rounded-lg bg-green-50 border border-green-200 text-green-700 flex items-center gap-3">
                    <i data-lucide="check-circle" class="w-5 h-5"></i>
                    <span th:text="${message}"></span>
                </div>

                <form th:action="@{/admin/login}" method="post" class="space-y-5">

                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                            E-mail
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                                <i data-lucide="mail" class="w-5 h-5"></i>
                            </div>
                            <input type="email" id="email" name="email" required
                                class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500"
                                placeholder="seu@email.com">
                        </div>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                            Senha
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                                <i data-lucide="lock" class="w-5 h-5"></i>
                            </div>
                            <input type="password" id="password" name="password" required
                                class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500"
                                placeholder="••••••••">
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" name="remember" class="w-4 h-4 text-snapdog-600 border-gray-300 rounded focus:ring-snapdog-500">
                            <span class="text-sm text-gray-600">Lembrar-me</span>
                        </label>
                    </div>

                    <button type="submit"
                        class="w-full py-2.5 bg-snapdog-600 hover:bg-snapdog-700 text-white rounded-lg font-medium transition-colors flex items-center justify-center gap-2">
                        <i data-lucide="log-in" class="w-5 h-5"></i>
                        Entrar
                    </button>

                </form>
            </div>

        </div>

        <p class="text-center text-gray-500 text-sm mt-6">
            © 2025 SnapDog Delivery. Todos os direitos reservados.
        </p>

    </div>

    <script>
        lucide.createIcons();
    </script>

</body>

</html>
