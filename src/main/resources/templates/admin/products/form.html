<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/fragments/layout :: layout(
          pageTitle=${pageTitle},
          activeMenu=${activeMenu},
          pageSubtitle=${pageSubtitle},
          headerActions=~{::headerActions},
          content=~{::content}
      )}">

<head>
  <title>Formulário de Produtos</title>
</head>

<body>

  <th:block th:fragment="headerActions">
    <a th:href="@{/admin/products}"
      class="inline-flex items-center gap-2 text-gray-600 hover:text-gray-800 px-4 py-2 rounded-lg font-medium transition-colors">
      <i data-lucide="arrow-left" class="w-5 h-5"></i>
      Voltar
    </a>
  </th:block>

  <!-- Conteúdo Principal -->
  <th:block th:fragment="content">

    <!-- Cropper.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

    <!-- Mensagens de Feedback -->
    <div th:if="${successMessage}" class="mb-6 p-4 rounded-lg bg-green-100 text-green-800 flex items-center gap-3">
      <i data-lucide="check-circle" class="w-5 h-5"></i>
      <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="mb-6 p-4 rounded-lg bg-red-100 text-red-800 flex items-center gap-3">
      <i data-lucide="alert-circle" class="w-5 h-5"></i>
      <span th:text="${errorMessage}"></span>
    </div>

    <!-- Formulário -->
    <form th:action="${product.id != null} ? @{/admin/products/{id}(id=${product.id})} : @{/admin/products/new}"
      th:object="${product}" method="post" enctype="multipart/form-data" class="space-y-6">

      <div class="bg-white rounded-xl shadow-sm border border-gray-200">
        <div class="p-6 border-b border-gray-200">
          <h2 class="text-lg font-semibold text-gray-800 flex items-center gap-2">
            <i data-lucide="user" class="w-5 h-5 text-snapdog-600"></i>
            Dados Gerais
          </h2>
        </div>
        <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">

          <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
              Nome <span class="text-red-500">*</span>
            </label>
            <input type="text" id="name" th:field="*{name}"
              th:classappend="${#fields.hasErrors('name')} ? 'border-red-500 focus:ring-red-500 focus:border-red-500' : ''"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500"
              placeholder="Digite o nome do produto">
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="mt-1 text-sm text-red-500">
            </p>
          </div>

          <div>
            <label for="price" class="block text-sm font-medium text-gray-700 mb-2">
              Preço <span class="text-red-500">*</span>
            </label>
            <input type="text" id="priceDisplay"
              th:classappend="${#fields.hasErrors('price')} ? 'border-red-500 focus:ring-red-500 focus:border-red-500' : ''"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500"
              placeholder="R$ 0,00"
              autocomplete="off">
            <input type="hidden" th:field="*{price}" id="priceHidden">
            <p th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="mt-1 text-sm text-red-500">
            </p>
          </div>

          <div class="md:col-span-2">
            <label for="description" class="block text-sm font-medium text-gray-700 mb-2">
              Descrição
            </label>
            <textarea rows="4" id="description" th:field="*{description}"
              th:classappend="${#fields.hasErrors('description')} ? 'border-red-500 focus:ring-red-500 focus:border-red-500' : ''"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500"
              placeholder="Digite a descrição do produto">
            </textarea>
            <p th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="mt-1 text-sm text-red-500">
            </p>
          </div>

          <!-- Categoria -->
          <div>
            <label for="category" class="block text-sm font-medium text-gray-700 mb-2">
              Categoria
            </label>
            <select id="category" th:field="*{category}"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500 bg-white">
              <option value="">Selecione uma categoria</option>
              <option th:each="cat : ${categories}" th:value="${cat.name()}" th:text="${cat.label}"></option>
            </select>
          </div>

          <!-- Imagem do Produto -->
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-2">Imagem do Produto</label>

            <input type="hidden" th:field="*{imageUrl}">

            <div class="flex gap-4 items-start">
              <div class="flex-1">
                <input type="file" id="imageFile" name="imageFile" accept="image/jpeg,image/png,image/webp,image/gif"
                  class="w-full text-sm text-gray-600 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-snapdog-50 file:text-snapdog-700 file:font-semibold hover:file:bg-snapdog-100"
                  onchange="previewUpload(this)">
                <p class="text-xs text-gray-400 mt-1">JPG, PNG, WEBP ou GIF. Máx 5MB.</p>
              </div>

              <!-- Preview -->
              <div class="w-24 h-24 border border-gray-200 rounded-lg overflow-hidden bg-gray-50 flex items-center justify-center flex-shrink-0">
                <img id="imagePreview"
                  th:src="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)} ? ${product.imageUrl} : ''"
                  th:class="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)} ? 'w-full h-full object-cover' : 'hidden'"
                  alt="Preview">
                <i id="imagePlaceholder"
                  th:class="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)} ? 'hidden' : ''"
                  data-lucide="image" class="w-8 h-8 text-gray-300"></i>
              </div>
            </div>
          </div>

          <!-- Visibilidade no Catálogo -->
          <div class="md:col-span-2">
            <label class="flex items-center gap-3 cursor-pointer">
              <input type="checkbox" id="active" th:field="*{active}"
                class="w-4 h-4 text-snapdog-600 border-gray-300 rounded focus:ring-snapdog-500">
              <span class="text-sm font-medium text-gray-700">Exibir no catálogo público</span>
            </label>
            <p class="mt-1 text-xs text-gray-500 ml-7">Quando desmarcado, o produto não aparece para clientes no catálogo.</p>
          </div>

        </div>
      </div>

      <!-- Botões de Ação -->
      <div class="flex items-center justify-end gap-4">
        <a th:href="@{/admin/products}"
          class="px-6 py-2 text-gray-700 hover:bg-gray-100 rounded-lg font-medium transition-colors">
          Cancelar
        </a>
        <button type="submit"
          class="px-6 py-2 bg-snapdog-600 hover:bg-snapdog-700 text-white rounded-lg font-medium transition-colors inline-flex items-center gap-2">
          <i data-lucide="check" class="w-5 h-5"></i>
          <span th:text="${product.id != null} ? 'Salvar Alterações' : 'Cadastrar Produto'">Cadastrar Produto</span>
        </button>
      </div>

    </form>

    <!-- Modal de Recorte de Imagem -->
    <div id="modalRecorte" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 p-4">
      <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl flex flex-col" style="max-height: 90vh;">

        <!-- Header do modal -->
        <div class="flex items-center justify-between p-4 border-b border-gray-200 flex-shrink-0">
          <h3 class="text-lg font-semibold text-gray-800 flex items-center gap-2">
            <i data-lucide="crop" class="w-5 h-5 text-snapdog-600"></i>
            Ajustar Imagem do Produto
          </h3>
          <button type="button" onclick="cancelarRecorte()"
            class="p-1 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>

        <!-- Área do cropper -->
        <div class="bg-gray-900 flex-shrink-0" style="height: 380px;">
          <img id="cropImage" src="" alt="Imagem para recorte" class="block max-w-full">
        </div>

        <!-- Controles -->
        <div class="px-4 py-3 border-b border-gray-200 flex items-center gap-4 flex-shrink-0">

          <!-- Zoom -->
          <span class="text-sm font-medium text-gray-600">Zoom</span>
          <div class="flex items-center gap-1">
            <button type="button" onclick="cropper && cropper.zoom(-0.1)"
              class="w-8 h-8 flex items-center justify-center border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors text-lg font-bold leading-none">
              −
            </button>
            <button type="button" onclick="cropper && cropper.zoom(0.1)"
              class="w-8 h-8 flex items-center justify-center border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors text-lg font-bold leading-none">
              +
            </button>
          </div>

          <!-- Proporção -->
          <div class="flex items-center gap-2 ml-auto">
            <span class="text-sm font-medium text-gray-600">Proporção</span>
            <button type="button" id="btnLivre" onclick="setAspectRatio(NaN)"
              class="px-3 py-1 text-xs font-semibold rounded-lg bg-snapdog-600 text-white transition-colors">
              Livre
            </button>
            <button type="button" id="btn1x1" onclick="setAspectRatio(1)"
              class="px-3 py-1 text-xs font-semibold rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">
              1:1
            </button>
          </div>

        </div>

        <!-- Rodapé do modal -->
        <div class="p-4 flex justify-end gap-3 flex-shrink-0">
          <button type="button" onclick="cancelarRecorte()"
            class="px-5 py-2 text-gray-700 hover:bg-gray-100 rounded-lg font-medium transition-colors">
            Cancelar
          </button>
          <button type="button" onclick="confirmarRecorte()"
            class="px-5 py-2 bg-snapdog-600 hover:bg-snapdog-700 text-white rounded-lg font-medium transition-colors inline-flex items-center gap-2">
            <i data-lucide="check" class="w-4 h-4"></i>
            Confirmar Recorte
          </button>
        </div>

      </div>
    </div>

    <!-- Cropper.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

    <script>
      let cropper = null;

      // ===== PREVIEW DO UPLOAD — abre modal de recorte =====
      function previewUpload(input) {
        if (!input.files || !input.files[0]) return;
        const reader = new FileReader();
        reader.onload = function(e) { abrirModalRecorte(e.target.result); };
        reader.readAsDataURL(input.files[0]);
      }

      // ===== MODAL DE RECORTE =====
      function abrirModalRecorte(src) {
        const modal   = document.getElementById('modalRecorte');
        const cropImg = document.getElementById('cropImage');

        modal.classList.remove('hidden');
        modal.classList.add('flex');
        cropImg.src = src;

        if (cropper) cropper.destroy();
        cropper = new Cropper(cropImg, {
          viewMode: 1,
          autoCropArea: 0.8,
          responsive: true,
          checkOrientation: false,
        });

        // Reinicia botões de proporção para "Livre"
        const activeClass   = 'px-3 py-1 text-xs font-semibold rounded-lg bg-snapdog-600 text-white transition-colors';
        const inactiveClass = 'px-3 py-1 text-xs font-semibold rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors';
        document.getElementById('btnLivre').className = activeClass;
        document.getElementById('btn1x1').className   = inactiveClass;

        lucide.createIcons();
      }

      function fecharModalRecorte() {
        const modal = document.getElementById('modalRecorte');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        if (cropper) {
          cropper.destroy();
          cropper = null;
        }
      }

      function cancelarRecorte() {
        document.getElementById('imageFile').value = '';
        fecharModalRecorte();
      }

      function confirmarRecorte() {
        if (!cropper) return;
        const canvas = cropper.getCroppedCanvas({ maxWidth: 1200, maxHeight: 1200 });
        canvas.toBlob(function(blob) {
          const fileInput = document.getElementById('imageFile');
          const dt = new DataTransfer();
          dt.items.add(new File([blob], 'produto.jpg', { type: 'image/jpeg' }));
          fileInput.files = dt.files;

          const img         = document.getElementById('imagePreview');
          const placeholder = document.getElementById('imagePlaceholder');
          img.src = canvas.toDataURL('image/jpeg');
          img.classList.remove('hidden');
          img.classList.add('w-full', 'h-full', 'object-cover');
          placeholder.classList.add('hidden');

          fecharModalRecorte();
        }, 'image/jpeg', 0.9);
      }

      function setAspectRatio(ratio) {
        if (!cropper) return;
        cropper.setAspectRatio(ratio);
        const activeClass   = 'px-3 py-1 text-xs font-semibold rounded-lg bg-snapdog-600 text-white transition-colors';
        const inactiveClass = 'px-3 py-1 text-xs font-semibold rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors';
        document.getElementById('btnLivre').className = isNaN(ratio) ? activeClass : inactiveClass;
        document.getElementById('btn1x1').className   = isNaN(ratio) ? inactiveClass : activeClass;
      }

      // ===== FORMATAÇÃO DE PREÇO =====
      const priceDisplay = document.getElementById("priceDisplay");
      const priceHidden  = document.getElementById("priceHidden");

      (function init() {
        const raw = priceHidden.value;
        if (raw) {
          const num = parseFloat(raw);
          if (!isNaN(num)) {
            priceDisplay.value = "R$ " + num.toFixed(2)
              .replace(".", ",")
              .replace(/\B(?=(\d{3})+(?!\d))/g, ".");
          }
        }
      })();

      priceDisplay.addEventListener("input", function (e) {
        let digits = e.target.value.replace(/\D/g, "");
        let num    = (parseInt(digits || 0, 10) / 100).toFixed(2);
        e.target.value    = "R$ " + num.replace(".", ",")
                                        .replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        priceHidden.value = num;
      });
    </script>

  </th:block>
</body>

</html>
