<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | SnapDog Delivery</title>

    <script src="/js/tailwind.js"></script>
    <link rel="stylesheet" href="/style/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'snapdog': {
                            50: '#fef2f2',
                            100: '#fee2e2',
                            200: '#fecaca',
                            300: '#fca5a5',
                            400: '#f87171',
                            500: '#ef4444',
                            600: '#dc2626',
                            700: '#b91c1c',
                            800: '#991b1b',
                            900: '#7f1d1d',
                            950: '#450a0a',
                        }
                    }
                }
            }
        }
    </script>

    <script src="/js/lucide.min.js"></script>
</head>

<body class="bg-gray-50 min-h-screen py-10 px-4">

    <div class="w-full max-w-2xl mx-auto">

        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center gap-3">
                <div class="w-12 h-12 bg-snapdog-600 rounded-xl flex items-center justify-center">
                    <span class="text-white font-bold text-2xl">S</span>
                </div>
                <div class="text-left">
                    <p class="font-bold text-xl text-gray-900 leading-tight">SnapDog</p>
                    <p class="text-snapdog-600 text-sm font-medium">Delivery</p>
                </div>
            </a>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">

            <div class="px-8 pt-8 pb-2">
                <h1 class="text-2xl font-bold text-gray-900 mb-1">Criar conta</h1>
                <p class="text-gray-500 text-sm mb-6">Preencha os dados abaixo para começar a fazer pedidos.</p>

                <!-- Erro de negócio (e-mail duplicado, etc.) -->
                <div th:if="${errorMessage}"
                     class="mb-5 p-4 rounded-lg bg-red-50 border border-red-200 text-red-700 flex items-center gap-3">
                    <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
                    <span th:text="${errorMessage}"></span>
                </div>
            </div>

            <form th:action="@{/register}" th:object="${registerDTO}" method="post" class="px-8 pb-8 space-y-6">

                <!-- Dados da conta -->
                <div>
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4 flex items-center gap-2">
                        <i data-lucide="user" class="w-4 h-4"></i>
                        Dados da conta
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                        <div class="md:col-span-2">
                            <label for="name" class="block text-sm font-medium text-gray-700 mb-1.5">Nome completo</label>
                            <input type="text" id="name" th:field="*{name}" autocomplete="name"
                                   class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500 outline-none transition"
                                   th:classappend="${#fields.hasErrors('name')} ? 'border-red-400' : ''"
                                   placeholder="Seu nome completo">
                            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
                               class="text-red-500 text-xs mt-1"></p>
                        </div>

                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">E-mail</label>
                            <input type="email" id="email" th:field="*{email}" autocomplete="email"
                                   class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500 outline-none transition"
                                   th:classappend="${#fields.hasErrors('email')} ? 'border-red-400' : ''"
                                   placeholder="seu@email.com">
                            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                               class="text-red-500 text-xs mt-1"></p>
                        </div>

                        <div>
                            <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Senha</label>
                            <input type="password" id="password" th:field="*{password}" autocomplete="new-password"
                                   class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500 outline-none transition"
                                   th:classappend="${#fields.hasErrors('password')} ? 'border-red-400' : ''"
                                   placeholder="Mínimo 6 caracteres">
                            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                               class="text-red-500 text-xs mt-1"></p>
                        </div>

                        <div>
                            <label for="phone" class="block text-sm font-medium text-gray-700 mb-1.5">Telefone</label>
                            <input type="tel" id="phone" th:field="*{phone}" autocomplete="tel"
                                   class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500 outline-none transition"
                                   th:classappend="${#fields.hasErrors('phone')} ? 'border-red-400' : ''"
                                   placeholder="(00) 12345-6789">
                            <p th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"
                               class="text-red-500 text-xs mt-1"></p>
                        </div>

                    </div>
                </div>

                <!-- Endereço de entrega -->
                <div>
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4 flex items-center gap-2">
                        <i data-lucide="map-pin" class="w-4 h-4"></i>
                        Endereço de entrega
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                        <div>
                            <label for="zipCode" class="block text-sm font-medium text-gray-700 mb-1.5">CEP</label>
                            <input type="text" id="zipCode" th:field="*{zipCode}" autocomplete="postal-code"
                                   class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500 outline-none transition"
                                   th:classappend="${#fields.hasErrors('zipCode')} ? 'border-red-400' : ''"
                                   placeholder="00000-000">
                            <p th:if="${#fields.hasErrors('zipCode')}" th:errors="*{zipCode}"
                               class="text-red-500 text-xs mt-1"></p>
                        </div>

                        <div>
                            <label for="street" class="block text-sm font-medium text-gray-700 mb-1.5">Rua</label>
                            <input type="text" id="street" th:field="*{street}" autocomplete="street-address"
                                   class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500 outline-none transition"
                                   th:classappend="${#fields.hasErrors('street')} ? 'border-red-400' : ''"
                                   placeholder="Nome da rua">
                            <p th:if="${#fields.hasErrors('street')}" th:errors="*{street}"
                               class="text-red-500 text-xs mt-1"></p>
                        </div>

                        <div>
                            <label for="number" class="block text-sm font-medium text-gray-700 mb-1.5">Número</label>
                            <input type="text" id="number" th:field="*{number}"
                                   class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500 outline-none transition"
                                   th:classappend="${#fields.hasErrors('number')} ? 'border-red-400' : ''"
                                   placeholder="123">
                            <p th:if="${#fields.hasErrors('number')}" th:errors="*{number}"
                               class="text-red-500 text-xs mt-1"></p>
                        </div>

                        <div>
                            <label for="complement" class="block text-sm font-medium text-gray-700 mb-1.5">
                                Complemento <span class="text-gray-400 font-normal">(opcional)</span>
                            </label>
                            <input type="text" id="complement" th:field="*{complement}"
                                   class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500 outline-none transition"
                                   placeholder="Apto, bloco, etc.">
                        </div>

                        <div>
                            <label for="neighborhood" class="block text-sm font-medium text-gray-700 mb-1.5">Bairro</label>
                            <input type="text" id="neighborhood" th:field="*{neighborhood}"
                                   class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500 outline-none transition"
                                   th:classappend="${#fields.hasErrors('neighborhood')} ? 'border-red-400' : ''"
                                   placeholder="Nome do bairro">
                            <p th:if="${#fields.hasErrors('neighborhood')}" th:errors="*{neighborhood}"
                               class="text-red-500 text-xs mt-1"></p>
                        </div>

                        <div>
                            <label for="city" class="block text-sm font-medium text-gray-700 mb-1.5">Cidade</label>
                            <input type="text" id="city" th:field="*{city}" autocomplete="address-level2"
                                   class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500 outline-none transition"
                                   th:classappend="${#fields.hasErrors('city')} ? 'border-red-400' : ''"
                                   placeholder="Sua cidade">
                            <p th:if="${#fields.hasErrors('city')}" th:errors="*{city}"
                               class="text-red-500 text-xs mt-1"></p>
                        </div>

                        <div>
                            <label for="state" class="block text-sm font-medium text-gray-700 mb-1.5">Estado</label>
                            <select id="state" th:field="*{state}"
                                    class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500 outline-none transition"
                                    th:classappend="${#fields.hasErrors('state')} ? 'border-red-400' : ''">
                                <option value="">Selecione o estado</option>
                                <option th:each="s : ${states}"
                                        th:value="${s.name()}"
                                        th:text="${s.name + ' (' + s.code + ')'}">
                                </option>
                            </select>
                            <p th:if="${#fields.hasErrors('state')}" th:errors="*{state}"
                               class="text-red-500 text-xs mt-1"></p>
                        </div>

                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit"
                            class="w-full py-3 bg-snapdog-600 hover:bg-snapdog-700 text-white rounded-lg font-semibold text-sm transition-colors flex items-center justify-center gap-2">
                        <i data-lucide="user-plus" class="w-4 h-4"></i>
                        Criar minha conta
                    </button>
                </div>

            </form>

            <div class="px-8 py-4 bg-gray-50 border-t border-gray-100 text-center">
                <p class="text-sm text-gray-600">
                    Já tem conta?
                    <a href="/login" class="text-snapdog-600 hover:text-snapdog-700 font-semibold">Entrar</a>
                </p>
            </div>

        </div>

        <p class="text-center text-gray-400 text-xs mt-6">
            © 2025 SnapDog Delivery. Todos os direitos reservados.
        </p>

    </div>

    <script>lucide.createIcons();</script>

</body>

</html>
