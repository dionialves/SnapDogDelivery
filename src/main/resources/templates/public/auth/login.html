<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | SnapDog Delivery</title>

    <script src="/js/tailwind.js"></script>
    <link rel="stylesheet" href="/style/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'snapdog': {
                            50: '#fef2f2',
                            100: '#fee2e2',
                            200: '#fecaca',
                            300: '#fca5a5',
                            400: '#f87171',
                            500: '#ef4444',
                            600: '#dc2626',
                            700: '#b91c1c',
                            800: '#991b1b',
                            900: '#7f1d1d',
                            950: '#450a0a',
                        }
                    }
                }
            }
        }
    </script>

    <script src="/js/lucide.min.js"></script>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center gap-3">
                <div class="w-12 h-12 bg-snapdog-600 rounded-xl flex items-center justify-center">
                    <span class="text-white font-bold text-2xl">S</span>
                </div>
                <div class="text-left">
                    <p class="font-bold text-xl text-gray-900 leading-tight">SnapDog</p>
                    <p class="text-snapdog-600 text-sm font-medium">Delivery</p>
                </div>
            </a>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">

            <div class="px-8 py-8">
                <h1 class="text-2xl font-bold text-gray-900 mb-1">Bem-vindo de volta!</h1>
                <p class="text-gray-500 text-sm mb-6">Acesse sua conta para fazer pedidos.</p>

                <!-- Flash de sucesso (pós-cadastro) -->
                <div th:if="${successMessage}"
                     class="mb-5 p-4 rounded-lg bg-green-50 border border-green-200 text-green-700 flex items-center gap-3">
                    <i data-lucide="check-circle" class="w-5 h-5 flex-shrink-0"></i>
                    <span th:text="${successMessage}"></span>
                </div>

                <!-- Erro de autenticação -->
                <div th:if="${error}"
                     class="mb-5 p-4 rounded-lg bg-red-50 border border-red-200 text-red-700 flex items-center gap-3">
                    <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
                    <span th:text="${error}"></span>
                </div>

                <form th:action="@{/login}" method="post" class="space-y-5">

                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">E-mail</label>
                        <div class="relative">
                            <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                                <i data-lucide="mail" class="w-4 h-4"></i>
                            </div>
                            <input type="email" id="email" name="email" required autocomplete="email"
                                   class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500 outline-none transition"
                                   placeholder="seu@email.com">
                        </div>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Senha</label>
                        <div class="relative">
                            <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                                <i data-lucide="lock" class="w-4 h-4"></i>
                            </div>
                            <input type="password" id="password" name="password" required autocomplete="current-password"
                                   class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-snapdog-500 focus:border-snapdog-500 outline-none transition"
                                   placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit"
                            class="w-full py-2.5 bg-snapdog-600 hover:bg-snapdog-700 text-white rounded-lg font-semibold text-sm transition-colors flex items-center justify-center gap-2">
                        <i data-lucide="log-in" class="w-4 h-4"></i>
                        Entrar
                    </button>

                </form>
            </div>

            <div class="px-8 py-4 bg-gray-50 border-t border-gray-100 text-center">
                <p class="text-sm text-gray-600">
                    Não tem conta?
                    <a href="/register" class="text-snapdog-600 hover:text-snapdog-700 font-semibold">Cadastre-se</a>
                </p>
            </div>

        </div>

        <p class="text-center text-gray-400 text-xs mt-6">
            © 2025 SnapDog Delivery. Todos os direitos reservados.
        </p>

    </div>

    <script>lucide.createIcons();</script>

</body>

</html>
