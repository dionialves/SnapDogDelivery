<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{public/fragments/layout :: layout('Finalizar pedido', ~{::main})}"
      lang="pt-BR">

<head><title>Finalizar pedido</title></head>

<body>
<main>
    <div class="max-w-4xl mx-auto px-4 py-10">

        <h1 class="text-2xl font-bold text-gray-900 mb-8">Finalizar pedido</h1>

        <div class="grid grid-cols-1 md:grid-cols-5 gap-6">

            <!-- Resumo do pedido -->
            <div class="md:col-span-3 space-y-4">
                <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-100">
                        <h2 class="font-semibold text-gray-900 flex items-center gap-2">
                            <i data-lucide="shopping-bag" class="w-4 h-4 text-snapdog-600"></i>
                            Itens do pedido
                        </h2>
                    </div>
                    <div class="divide-y divide-gray-50">
                        <div th:each="item : ${cart.itemList}" class="flex items-center gap-3 px-6 py-3">
                            <div class="w-10 h-10 flex-shrink-0 rounded-lg overflow-hidden bg-gray-100">
                                <img th:if="${item.imageUrl != null and !#strings.isEmpty(item.imageUrl)}"
                                     th:src="${item.imageUrl}" th:alt="${item.productName}"
                                     class="w-full h-full object-cover">
                                <div th:unless="${item.imageUrl != null and !#strings.isEmpty(item.imageUrl)}"
                                     class="w-full h-full flex items-center justify-center text-gray-200">
                                    <i data-lucide="image" class="w-4 h-4"></i>
                                </div>
                            </div>
                            <div class="flex-1">
                                <p class="text-sm font-medium text-gray-900" th:text="${item.productName}"></p>
                                <p class="text-xs text-gray-500"
                                   th:text="'Qtd: ' + ${item.quantity} + ' × R$ ' + ${#numbers.formatDecimal(item.unitPrice, 1, 'POINT', 2, 'COMMA')}"></p>
                            </div>
                            <span class="text-sm font-semibold text-gray-900"
                                  th:text="'R$ ' + ${#numbers.formatDecimal(item.subtotal, 1, 'POINT', 2, 'COMMA')}"></span>
                        </div>
                    </div>
                </div>

                <!-- Endereço de entrega -->
                <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-100">
                        <h2 class="font-semibold text-gray-900 flex items-center gap-2">
                            <i data-lucide="map-pin" class="w-4 h-4 text-snapdog-600"></i>
                            Endereço de entrega
                        </h2>
                    </div>
                    <div class="px-6 py-4">
                        <p class="font-medium text-gray-900" th:text="${customer.name}"></p>
                        <p class="text-sm text-gray-600 mt-1">
                            <span th:text="${customer.street + ', ' + customer.number}"></span>
                            <span th:if="${customer.complement != null and !#strings.isEmpty(customer.complement)}"
                                  th:text="' — ' + ${customer.complement}"></span>
                        </p>
                        <p class="text-sm text-gray-600"
                           th:text="${customer.neighborhood + ', ' + customer.city + '/' + customer.state.code}"></p>
                        <p class="text-sm text-gray-600" th:text="'CEP: ' + ${customer.zipCode}"></p>
                        <a href="/account/profile" class="text-xs text-snapdog-600 hover:underline mt-2 inline-block">
                            Alterar endereço
                        </a>
                    </div>
                </div>

            </div>

            <!-- Total e confirmar -->
            <div class="md:col-span-2">
                <div class="bg-white rounded-2xl border border-gray-200 p-6 sticky top-20">
                    <h2 class="font-semibold text-gray-900 mb-4">Resumo</h2>

                    <div class="space-y-2 mb-4">
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-600">Subtotal</span>
                            <span th:text="'R$ ' + ${#numbers.formatDecimal(cart.total, 1, 'POINT', 2, 'COMMA')}"></span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-600">Entrega</span>
                            <span class="text-green-600 font-medium">Grátis</span>
                        </div>
                    </div>

                    <div class="border-t border-gray-100 pt-3 mb-6">
                        <div class="flex justify-between font-bold">
                            <span class="text-gray-900">Total</span>
                            <span class="text-snapdog-600 text-lg"
                                  th:text="'R$ ' + ${#numbers.formatDecimal(cart.total, 1, 'POINT', 2, 'COMMA')}"></span>
                        </div>
                    </div>

                    <form th:action="@{/checkout/confirm}" method="post">
                        <button type="submit"
                                class="w-full flex items-center justify-center gap-2 py-3 bg-snapdog-600 hover:bg-snapdog-700 text-white rounded-xl font-bold transition-colors">
                            <i data-lucide="check-circle" class="w-5 h-5"></i>
                            Confirmar pedido
                        </button>
                    </form>

                    <a href="/cart"
                       class="mt-3 flex items-center justify-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 transition-colors">
                        <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i>
                        Voltar ao carrinho
                    </a>
                </div>
            </div>

        </div>

    </div>
</main>
</body>
</html>
