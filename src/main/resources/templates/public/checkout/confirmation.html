<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{public/fragments/layout :: layout('Pedido confirmado', ~{::main})}"
      lang="pt-BR">

<head><title>Pedido confirmado</title></head>

<body>
<main>
    <div class="max-w-2xl mx-auto px-4 py-16">

        <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">

            <!-- Header de sucesso -->
            <div class="bg-green-50 border-b border-green-100 px-8 py-8 text-center">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="check-circle" class="w-9 h-9 text-green-600"></i>
                </div>
                <h1 class="text-2xl font-bold text-green-800 mb-1">Pedido confirmado!</h1>
                <p class="text-green-700 text-sm">
                    Pedido <strong th:text="'#' + ${order.id}"></strong> recebido com sucesso.
                </p>
            </div>

            <div class="px-8 py-6 space-y-5">

                <!-- Status atual -->
                <div class="flex items-center gap-3 p-4 bg-snapdog-50 rounded-xl border border-snapdog-100">
                    <i data-lucide="clock" class="w-5 h-5 text-snapdog-600 flex-shrink-0"></i>
                    <div>
                        <p class="font-medium text-gray-900 text-sm">Status do pedido</p>
                        <p class="text-snapdog-600 font-semibold" th:text="${order.status}"></p>
                    </div>
                </div>

                <!-- Endereço de entrega -->
                <div th:if="${order.deliveryAddress != null}">
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-2 flex items-center gap-2">
                        <i data-lucide="map-pin" class="w-4 h-4"></i>
                        Endereço de entrega
                    </h2>
                    <p class="text-sm text-gray-700" th:text="${order.deliveryAddress}"></p>
                </div>

                <!-- Itens do pedido -->
                <div>
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3 flex items-center gap-2">
                        <i data-lucide="package" class="w-4 h-4"></i>
                        Itens
                    </h2>
                    <div class="space-y-2">
                        <div th:each="item : ${order.products}"
                             class="flex justify-between text-sm py-2 border-b border-gray-50 last:border-0">
                            <span class="text-gray-700">
                                <span th:text="${item.quantity} + 'x '"></span>
                                <span th:text="${item.productName}"></span>
                            </span>
                            <span class="font-medium text-gray-900"
                                  th:text="'R$ ' + ${#numbers.formatDecimal(item.priceAtTime.multiply(new java.math.BigDecimal(item.quantity)), 1, 'POINT', 2, 'COMMA')}"></span>
                        </div>
                    </div>
                </div>

                <!-- Total -->
                <div class="flex justify-between items-center pt-3 border-t border-gray-200">
                    <span class="font-bold text-gray-900">Total</span>
                    <span class="font-bold text-snapdog-600 text-lg"
                          th:text="'R$ ' + ${#numbers.formatDecimal(order.totalValue, 1, 'POINT', 2, 'COMMA')}"></span>
                </div>

            </div>

            <!-- Ações -->
            <div class="px-8 py-5 bg-gray-50 border-t border-gray-100 flex flex-col sm:flex-row gap-3">
                <a href="/account/orders"
                   class="flex-1 flex items-center justify-center gap-2 py-2.5 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
                    <i data-lucide="list" class="w-4 h-4"></i>
                    Meus pedidos
                </a>
                <a href="/catalog"
                   class="flex-1 flex items-center justify-center gap-2 py-2.5 bg-snapdog-600 hover:bg-snapdog-700 text-white rounded-lg text-sm font-semibold transition-colors">
                    <i data-lucide="utensils" class="w-4 h-4"></i>
                    Fazer novo pedido
                </a>
            </div>

        </div>

    </div>
</main>
</body>
</html>
