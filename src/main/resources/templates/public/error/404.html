<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{public/fragments/layout :: layout(
          pageTitle='Página não encontrada',
          content=~{::content}
      )}">

<head>
    <title>404 - Página não encontrada</title>
</head>

<body>

    <th:block th:fragment="content">

        <div class="flex flex-col items-center justify-center min-h-[60vh] px-4 py-16">

            <div class="text-9xl mb-6">🌭</div>

            <h1 class="text-8xl font-bold text-snapdog-600 mb-4">404</h1>

            <h2 class="text-2xl font-semibold text-gray-800 mb-2">Ops! Página não encontrada</h2>
            <p class="text-gray-500 text-center max-w-md mb-8">
                Parece que esse hot dog foi entregue no endereço errado...
                A página que você procura não existe ou foi removida.
            </p>

            <div class="flex items-center gap-4">
                <a th:href="@{/catalog}"
                    class="inline-flex items-center gap-2 bg-snapdog-600 hover:bg-snapdog-700 text-white px-6 py-3 rounded-lg font-medium transition-colors">
                    <i data-lucide="utensils" class="w-5 h-5"></i>
                    Ver cardápio
                </a>
                <a th:href="@{/}"
                    class="inline-flex items-center gap-2 border border-gray-300 hover:bg-gray-50 text-gray-700 px-6 py-3 rounded-lg font-medium transition-colors">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    Ir para o início
                </a>
            </div>

        </div>

    </th:block>

</body>

</html>
