<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{public/fragments/layout :: layout('Meus pedidos', ~{::main})}"
      lang="pt-BR">

<head><title>Meus pedidos</title></head>

<body>
<main>
    <div class="max-w-4xl mx-auto px-4 py-10">

        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Meus pedidos</h1>
                <p class="text-gray-500 text-sm mt-1">Histórico completo dos seus pedidos</p>
            </div>
            <a href="/account" class="text-sm text-gray-500 hover:text-gray-700 flex items-center gap-1">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Voltar
            </a>
        </div>

        <!-- Lista de pedidos -->
        <div th:if="${orders != null and orders.hasContent()}"
             class="bg-white rounded-2xl border border-gray-200 overflow-hidden">
            <div class="divide-y divide-gray-100">
                <a th:each="order : ${orders}"
                   th:href="@{/account/orders/{id}(id=${order.id})}"
                   class="flex items-center gap-4 px-6 py-4 hover:bg-gray-50 transition-colors">

                    <div class="w-10 h-10 bg-snapdog-50 rounded-full flex items-center justify-center flex-shrink-0">
                        <i data-lucide="package" class="w-5 h-5 text-snapdog-600"></i>
                    </div>

                    <div class="flex-1 min-w-0">
                        <p class="font-medium text-gray-900" th:text="'Pedido #' + ${order.id}"></p>
                        <p class="text-xs text-gray-500"
                           th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></p>
                        <p class="text-xs text-gray-500 mt-0.5"
                           th:text="${#lists.size(order.products)} + ' ' + (${#lists.size(order.products)} == 1 ? 'item' : 'itens')"></p>
                    </div>

                    <div class="text-right">
                        <p class="font-semibold text-gray-900"
                           th:text="'R$ ' + ${#numbers.formatDecimal(order.totalValue, 1, 'POINT', 2, 'COMMA')}"></p>
                        <span class="px-2 py-0.5 rounded-full text-xs font-semibold"
                              th:classappend="${order.status == 'PENDING'} ? 'bg-yellow-100 text-yellow-700' : (${order.status == 'DELIVERED'} ? 'bg-green-100 text-green-700' : (${order.status == 'CANCELED'} ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'))"
                              th:text="${order.statusLabel}"></span>
                    </div>

                    <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 flex-shrink-0"></i>
                </a>
            </div>
        </div>

        <!-- Estado vazio -->
        <div th:unless="${orders != null and orders.hasContent()}"
             class="text-center py-20 bg-white rounded-2xl border border-gray-200">
            <i data-lucide="inbox" class="w-12 h-12 text-gray-300 mx-auto mb-4"></i>
            <h2 class="text-lg font-semibold text-gray-700 mb-1">Nenhum pedido encontrado</h2>
            <p class="text-gray-400 text-sm mb-6">Você ainda não realizou nenhum pedido.</p>
            <a href="/catalog"
               class="inline-flex items-center gap-2 px-6 py-2.5 bg-snapdog-600 hover:bg-snapdog-700 text-white rounded-lg font-semibold text-sm transition-colors">
                <i data-lucide="utensils" class="w-4 h-4"></i>
                Ver cardápio
            </a>
        </div>

        <!-- Paginação -->
        <div th:if="${totalPages > 1}" class="flex justify-center gap-2 mt-8">
            <a th:unless="${currentPage == 0}"
               th:href="@{/account/orders(page=${currentPage - 1})}"
               class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition-colors flex items-center gap-1">
                <i data-lucide="chevron-left" class="w-4 h-4"></i>
                Anterior
            </a>
            <span class="px-4 py-2 text-sm text-gray-500">
                Página <strong th:text="${currentPage + 1}"></strong> de <strong th:text="${totalPages}"></strong>
            </span>
            <a th:unless="${currentPage + 1 >= totalPages}"
               th:href="@{/account/orders(page=${currentPage + 1})}"
               class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition-colors flex items-center gap-1">
                Próxima
                <i data-lucide="chevron-right" class="w-4 h-4"></i>
            </a>
        </div>

    </div>
</main>
</body>
</html>
