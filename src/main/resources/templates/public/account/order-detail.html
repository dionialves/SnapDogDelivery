<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{public/fragments/layout :: layout('Detalhes do pedido', ~{::main})}"
      lang="pt-BR">

<head><title>Detalhes do pedido</title></head>

<body>
<main>
    <div class="max-w-3xl mx-auto px-4 py-10">

        <!-- Breadcrumb -->
        <nav class="text-sm text-gray-500 mb-6 flex items-center gap-1.5">
            <a href="/account" class="hover:text-snapdog-600">Minha conta</a>
            <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
            <a href="/account/orders" class="hover:text-snapdog-600">Pedidos</a>
            <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
            <span class="text-gray-900 font-medium" th:text="'#' + ${order.id}"></span>
        </nav>

        <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">

            <!-- Cabeçalho -->
            <div class="px-8 py-6 border-b border-gray-100">
                <div class="flex items-start justify-between">
                    <div>
                        <h1 class="text-xl font-bold text-gray-900" th:text="'Pedido #' + ${order.id}"></h1>
                        <p class="text-sm text-gray-500 mt-1"
                           th:text="'Realizado em ' + ${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></p>
                    </div>
                    <span class="px-3 py-1 rounded-full text-sm font-semibold"
                          th:classappend="${order.status == 'PENDING'} ? 'bg-yellow-100 text-yellow-700' : (${order.status == 'DELIVERED'} ? 'bg-green-100 text-green-700' : (${order.status == 'CANCELED'} ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'))"
                          th:text="${order.status}"></span>
                </div>
            </div>

            <div class="px-8 py-6 space-y-6">

                <!-- Itens -->
                <div>
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">Itens do pedido</h2>
                    <div class="space-y-2">
                        <div th:each="item : ${order.products}"
                             class="flex justify-between items-center py-2 border-b border-gray-50 last:border-0">
                            <div>
                                <p class="text-sm font-medium text-gray-900">
                                    <span th:text="${item.quantity}"></span>x
                                    <span th:text="${item.productName}"></span>
                                </p>
                                <p class="text-xs text-gray-500"
                                   th:text="'R$ ' + ${#numbers.formatDecimal(item.priceAtTime, 1, 'POINT', 2, 'COMMA')} + ' cada'"></p>
                            </div>
                            <span class="text-sm font-semibold text-gray-900"
                                  th:text="'R$ ' + ${#numbers.formatDecimal(item.priceAtTime.multiply(new java.math.BigDecimal(item.quantity)), 1, 'POINT', 2, 'COMMA')}"></span>
                        </div>
                    </div>
                </div>

                <!-- Endereço de entrega -->
                <div th:if="${order.deliveryAddress != null}">
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-2">Endereço de entrega</h2>
                    <p class="text-sm text-gray-700" th:text="${order.deliveryAddress}"></p>
                </div>

                <!-- Total -->
                <div class="border-t border-gray-200 pt-4">
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-gray-900">Total</span>
                        <span class="font-bold text-snapdog-600 text-xl"
                              th:text="'R$ ' + ${#numbers.formatDecimal(order.totalValue, 1, 'POINT', 2, 'COMMA')}"></span>
                    </div>
                </div>

            </div>

            <div class="px-8 py-5 bg-gray-50 border-t border-gray-100">
                <a href="/account/orders"
                   class="flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Voltar aos meus pedidos
                </a>
            </div>

        </div>

    </div>
</main>
</body>
</html>
