<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:replace="~{public/fragments/layout :: layout('Cardápio', ~{::main})}" lang="pt-BR">

<head>
    <title>Cardápio</title>
</head>

<body>
    <main>
        <div class="max-w-6xl mx-auto px-4 py-10">

            <!-- Cabeçalho -->
            <div class="mb-6">
                <h1 class="text-2xl font-bold text-gray-900">Cardápio</h1>
                <p class="text-gray-500 text-sm mt-1">Escolha seus favoritos</p>
            </div>

            <!-- Tabs de categoria -->
            <div class="flex gap-2 mb-8 border-b border-gray-200">
                <a th:href="@{/catalog}"
                    th:classappend="${selectedCategory == null} ? 'border-b-2 border-snapdog-600 text-snapdog-600' : 'text-gray-500 hover:text-gray-700'"
                    class="px-4 py-2.5 text-sm font-medium transition-colors -mb-px">
                    Todos
                </a>
                <a th:href="@{/catalog(category='HOT_DOG')}"
                    th:classappend="${selectedCategory != null and selectedCategory.name() == 'HOT_DOG'} ? 'border-b-2 border-snapdog-600 text-snapdog-600' : 'text-gray-500 hover:text-gray-700'"
                    class="px-4 py-2.5 text-sm font-medium transition-colors -mb-px">
                    Hot Dog
                </a>
                <a th:href="@{/catalog(category='BEBIDA')}"
                    th:classappend="${selectedCategory != null and selectedCategory.name() == 'BEBIDA'} ? 'border-b-2 border-snapdog-600 text-snapdog-600' : 'text-gray-500 hover:text-gray-700'"
                    class="px-4 py-2.5 text-sm font-medium transition-colors -mb-px">
                    Bebidas
                </a>
            </div>

            <!-- ===== VIEW "TODOS": duas seções sem paginação ===== -->
            <th:block th:if="${selectedCategory == null}">

                <!-- Seção Hot Dog -->
                <th:block th:if="${hotDogProducts != null and !#lists.isEmpty(hotDogProducts)}">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                        <i data-lucide="utensils" class="w-5 h-5 text-snapdog-600"></i>
                        Hot Dog
                    </h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 mb-10">
                        <div th:each="product : ${hotDogProducts}"
                            class="bg-white rounded-2xl border border-gray-200 overflow-hidden hover:shadow-md transition-shadow group flex flex-col">

                            <!-- Imagem (autenticado → abre modal; não autenticado → estático) -->
                            <button type="button" sec:authorize="hasRole('CUSTOMER')"
                                th:data-id="${product.id}"
                                th:data-name="${product.name}"
                                th:data-description="${product.description != null ? product.description : ''}"
                                th:data-image="${product.imageUrl != null ? product.imageUrl : ''}"
                                onclick="openQuantityModal(this)"
                                class="aspect-video bg-white overflow-hidden w-full cursor-pointer">
                                <img th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                                    th:src="${product.imageUrl}" th:alt="${product.name}"
                                    class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-300">
                                <div th:unless="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                                    class="w-full h-full flex items-center justify-center text-gray-200">
                                    <i data-lucide="image" class="w-10 h-10"></i>
                                </div>
                            </button>
                            <div sec:authorize="!hasRole('CUSTOMER')" class="aspect-video bg-white overflow-hidden">
                                <img th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                                    th:src="${product.imageUrl}" th:alt="${product.name}"
                                    class="w-full h-full object-contain">
                                <div th:unless="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                                    class="w-full h-full flex items-center justify-center text-gray-200">
                                    <i data-lucide="image" class="w-10 h-10"></i>
                                </div>
                            </div>

                            <div class="p-4 flex flex-col flex-1">
                                <!-- Nome (autenticado → abre modal; não autenticado → texto) -->
                                <button type="button" sec:authorize="hasRole('CUSTOMER')"
                                    th:data-id="${product.id}"
                                    th:data-name="${product.name}"
                                    th:data-description="${product.description != null ? product.description : ''}"
                                    th:data-image="${product.imageUrl != null ? product.imageUrl : ''}"
                                    onclick="openQuantityModal(this)"
                                    class="font-semibold text-gray-900 mb-1 hover:text-snapdog-600 transition-colors line-clamp-1 text-left w-full"
                                    th:text="${product.name}">Nome</button>
                                <span sec:authorize="!hasRole('CUSTOMER')"
                                    class="font-semibold text-gray-900 mb-1 line-clamp-1 block"
                                    th:text="${product.name}">Nome</span>

                                <p th:if="${product.description != null and !#strings.isEmpty(product.description)}"
                                    class="text-xs text-gray-500 mb-3 line-clamp-2 flex-1" th:text="${product.description}"></p>
                                <div th:unless="${product.description != null and !#strings.isEmpty(product.description)}"
                                    class="flex-1"></div>

                                <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
                                    <span class="text-snapdog-600 font-bold"
                                        th:text="'R$ ' + ${#numbers.formatDecimal(product.price, 1, 'POINT', 2, 'COMMA')}">
                                    </span>
                                    <button type="button" sec:authorize="hasRole('CUSTOMER')"
                                        th:data-id="${product.id}"
                                        th:data-name="${product.name}"
                                        th:data-description="${product.description != null ? product.description : ''}"
                                        th:data-image="${product.imageUrl != null ? product.imageUrl : ''}"
                                        onclick="openQuantityModal(this)"
                                        class="flex items-center gap-1.5 px-3 py-1.5 bg-snapdog-600 hover:bg-snapdog-700 text-white rounded-lg text-xs font-semibold transition-colors">
                                        <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                                        Adicionar
                                    </button>
                                    <a sec:authorize="!hasRole('CUSTOMER')" href="/login"
                                        class="flex items-center gap-1.5 px-3 py-1.5 bg-snapdog-600 hover:bg-snapdog-700 text-white rounded-lg text-xs font-semibold transition-colors">
                                        <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                                        Adicionar
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </th:block>

                <!-- Seção Bebidas -->
                <th:block th:if="${bebidaProducts != null and !#lists.isEmpty(bebidaProducts)}">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                        <i data-lucide="cup-soda" class="w-5 h-5 text-snapdog-600"></i>
                        Bebidas
                    </h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
                        <div th:each="product : ${bebidaProducts}"
                            class="bg-white rounded-2xl border border-gray-200 overflow-hidden hover:shadow-md transition-shadow group flex flex-col">

                            <button type="button" sec:authorize="hasRole('CUSTOMER')"
                                th:data-id="${product.id}"
                                th:data-name="${product.name}"
                                th:data-description="${product.description != null ? product.description : ''}"
                                th:data-image="${product.imageUrl != null ? product.imageUrl : ''}"
                                onclick="openQuantityModal(this)"
                                class="aspect-video bg-white overflow-hidden w-full cursor-pointer">
                                <img th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                                    th:src="${product.imageUrl}" th:alt="${product.name}"
                                    class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-300">
                                <div th:unless="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                                    class="w-full h-full flex items-center justify-center text-gray-200">
                                    <i data-lucide="image" class="w-10 h-10"></i>
                                </div>
                            </button>
                            <div sec:authorize="!hasRole('CUSTOMER')" class="aspect-video bg-white overflow-hidden">
                                <img th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                                    th:src="${product.imageUrl}" th:alt="${product.name}"
                                    class="w-full h-full object-contain">
                                <div th:unless="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                                    class="w-full h-full flex items-center justify-center text-gray-200">
                                    <i data-lucide="image" class="w-10 h-10"></i>
                                </div>
                            </div>

                            <div class="p-4 flex flex-col flex-1">
                                <button type="button" sec:authorize="hasRole('CUSTOMER')"
                                    th:data-id="${product.id}"
                                    th:data-name="${product.name}"
                                    th:data-description="${product.description != null ? product.description : ''}"
                                    th:data-image="${product.imageUrl != null ? product.imageUrl : ''}"
                                    onclick="openQuantityModal(this)"
                                    class="font-semibold text-gray-900 mb-1 hover:text-snapdog-600 transition-colors line-clamp-1 text-left w-full"
                                    th:text="${product.name}">Nome</button>
                                <span sec:authorize="!hasRole('CUSTOMER')"
                                    class="font-semibold text-gray-900 mb-1 line-clamp-1 block"
                                    th:text="${product.name}">Nome</span>

                                <p th:if="${product.description != null and !#strings.isEmpty(product.description)}"
                                    class="text-xs text-gray-500 mb-3 line-clamp-2 flex-1" th:text="${product.description}"></p>
                                <div th:unless="${product.description != null and !#strings.isEmpty(product.description)}"
                                    class="flex-1"></div>

                                <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
                                    <span class="text-snapdog-600 font-bold"
                                        th:text="'R$ ' + ${#numbers.formatDecimal(product.price, 1, 'POINT', 2, 'COMMA')}">
                                    </span>
                                    <button type="button" sec:authorize="hasRole('CUSTOMER')"
                                        th:data-id="${product.id}"
                                        th:data-name="${product.name}"
                                        th:data-description="${product.description != null ? product.description : ''}"
                                        th:data-image="${product.imageUrl != null ? product.imageUrl : ''}"
                                        onclick="openQuantityModal(this)"
                                        class="flex items-center gap-1.5 px-3 py-1.5 bg-snapdog-600 hover:bg-snapdog-700 text-white rounded-lg text-xs font-semibold transition-colors">
                                        <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                                        Adicionar
                                    </button>
                                    <a sec:authorize="!hasRole('CUSTOMER')" href="/login"
                                        class="flex items-center gap-1.5 px-3 py-1.5 bg-snapdog-600 hover:bg-snapdog-700 text-white rounded-lg text-xs font-semibold transition-colors">
                                        <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                                        Adicionar
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </th:block>

                <!-- Estado vazio -->
                <div th:if="${(hotDogProducts == null or #lists.isEmpty(hotDogProducts)) and (bebidaProducts == null or #lists.isEmpty(bebidaProducts))}"
                    class="text-center py-20 text-gray-400">
                    <i data-lucide="package-open" class="w-12 h-12 mx-auto mb-4"></i>
                    <p class="text-lg font-medium">Nenhum produto disponível no momento.</p>
                    <p class="text-sm mt-1">Volte mais tarde!</p>
                </div>

            </th:block>

            <!-- ===== VIEW FILTRADA: grid paginado por categoria ===== -->
            <th:block th:unless="${selectedCategory == null}">

                <div th:if="${products != null and products.hasContent()}"
                    class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">

                    <div th:each="product : ${products}"
                        class="bg-white rounded-2xl border border-gray-200 overflow-hidden hover:shadow-md transition-shadow group flex flex-col">

                        <button type="button" sec:authorize="hasRole('CUSTOMER')"
                            th:data-id="${product.id}"
                            th:data-name="${product.name}"
                            th:data-description="${product.description != null ? product.description : ''}"
                            th:data-image="${product.imageUrl != null ? product.imageUrl : ''}"
                            onclick="openQuantityModal(this)"
                            class="aspect-video bg-white overflow-hidden w-full cursor-pointer">
                            <img th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                                th:src="${product.imageUrl}" th:alt="${product.name}"
                                class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-300">
                            <div th:unless="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                                class="w-full h-full flex items-center justify-center text-gray-200">
                                <i data-lucide="image" class="w-10 h-10"></i>
                            </div>
                        </button>
                        <div sec:authorize="!hasRole('CUSTOMER')" class="aspect-video bg-white overflow-hidden">
                            <img th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                                th:src="${product.imageUrl}" th:alt="${product.name}"
                                class="w-full h-full object-contain">
                            <div th:unless="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                                class="w-full h-full flex items-center justify-center text-gray-200">
                                <i data-lucide="image" class="w-10 h-10"></i>
                            </div>
                        </div>

                        <div class="p-4 flex flex-col flex-1">
                            <button type="button" sec:authorize="hasRole('CUSTOMER')"
                                th:data-id="${product.id}"
                                th:data-name="${product.name}"
                                th:data-description="${product.description != null ? product.description : ''}"
                                th:data-image="${product.imageUrl != null ? product.imageUrl : ''}"
                                onclick="openQuantityModal(this)"
                                class="font-semibold text-gray-900 mb-1 hover:text-snapdog-600 transition-colors line-clamp-1 text-left w-full"
                                th:text="${product.name}">Nome</button>
                            <span sec:authorize="!hasRole('CUSTOMER')"
                                class="font-semibold text-gray-900 mb-1 line-clamp-1 block"
                                th:text="${product.name}">Nome</span>

                            <p th:if="${product.description != null and !#strings.isEmpty(product.description)}"
                                class="text-xs text-gray-500 mb-3 line-clamp-2 flex-1" th:text="${product.description}"></p>
                            <div th:unless="${product.description != null and !#strings.isEmpty(product.description)}"
                                class="flex-1"></div>

                            <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
                                <span class="text-snapdog-600 font-bold"
                                    th:text="'R$ ' + ${#numbers.formatDecimal(product.price, 1, 'POINT', 2, 'COMMA')}">
                                </span>
                                <button type="button" sec:authorize="hasRole('CUSTOMER')"
                                    th:data-id="${product.id}"
                                    th:data-name="${product.name}"
                                    th:data-description="${product.description != null ? product.description : ''}"
                                    th:data-image="${product.imageUrl != null ? product.imageUrl : ''}"
                                    onclick="openQuantityModal(this)"
                                    class="flex items-center gap-1.5 px-3 py-1.5 bg-snapdog-600 hover:bg-snapdog-700 text-white rounded-lg text-xs font-semibold transition-colors">
                                    <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                                    Adicionar
                                </button>
                                <a sec:authorize="!hasRole('CUSTOMER')" href="/login"
                                    class="flex items-center gap-1.5 px-3 py-1.5 bg-snapdog-600 hover:bg-snapdog-700 text-white rounded-lg text-xs font-semibold transition-colors">
                                    <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                                    Adicionar
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Estado vazio para categoria filtrada -->
                <div th:unless="${products != null and products.hasContent()}" class="text-center py-20 text-gray-400">
                    <i data-lucide="package-open" class="w-12 h-12 mx-auto mb-4"></i>
                    <p class="text-lg font-medium">Nenhum produto disponível nesta categoria.</p>
                </div>

                <!-- Paginação -->
                <div th:if="${totalPages > 1}" class="flex justify-center gap-2 mt-10">
                    <a th:unless="${currentPage == 0}" th:href="@{/catalog(page=${currentPage - 1}, category=${selectedCategory})}"
                        class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition-colors flex items-center gap-1">
                        <i data-lucide="chevron-left" class="w-4 h-4"></i>
                        Anterior
                    </a>
                    <span class="px-4 py-2 text-sm text-gray-500">
                        Página <strong th:text="${currentPage + 1}"></strong> de <strong th:text="${totalPages}"></strong>
                    </span>
                    <a th:unless="${currentPage + 1 >= totalPages}" th:href="@{/catalog(page=${currentPage + 1}, category=${selectedCategory})}"
                        class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition-colors flex items-center gap-1">
                        Próxima
                        <i data-lucide="chevron-right" class="w-4 h-4"></i>
                    </a>
                </div>

            </th:block>

        </div>

        <th:block th:replace="~{public/fragments/quantity-modal :: quantityModal}"></th:block>

    </main>
</body>

</html>
