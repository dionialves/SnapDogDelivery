<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{public/fragments/layout :: layout(${product.name}, ~{::main})}"
      lang="pt-BR">

<head><title>Produto</title></head>

<body>
<main>
    <div class="max-w-4xl mx-auto px-4 py-10">

        <!-- Breadcrumb -->
        <nav class="text-sm text-gray-500 mb-6 flex items-center gap-1.5">
            <a href="/catalog" class="hover:text-snapdog-600 transition-colors">Cardápio</a>
            <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
            <span class="text-gray-900 font-medium" th:text="${product.name}"></span>
        </nav>

        <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">
            <div class="md:flex">

                <!-- Imagem -->
                <div class="md:w-1/2 aspect-square bg-gray-100 flex-shrink-0">
                    <img th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                         th:src="${product.imageUrl}" th:alt="${product.name}"
                         class="w-full h-full object-cover">
                    <div th:unless="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                         class="w-full h-full flex items-center justify-center text-gray-200">
                        <i data-lucide="image" class="w-20 h-20"></i>
                    </div>
                </div>

                <!-- Detalhes -->
                <div class="p-8 flex flex-col md:w-1/2">
                    <h1 class="text-2xl font-bold text-gray-900 mb-2" th:text="${product.name}"></h1>

                    <p th:if="${product.description != null and !#strings.isEmpty(product.description)}"
                       class="text-gray-600 text-sm mb-6 leading-relaxed" th:text="${product.description}"></p>

                    <div class="mt-auto">
                        <div class="mb-6">
                            <span class="text-3xl font-bold text-snapdog-600"
                                  th:text="'R$ ' + ${#numbers.formatDecimal(product.price, 1, 'POINT', 2, 'COMMA')}"></span>
                        </div>

                        <!-- Adicionar ao carrinho (autenticado como CUSTOMER) -->
                        <form sec:authorize="hasRole('CUSTOMER')"
                              th:action="@{/cart/add}" method="post" class="flex gap-3">
                            <input type="hidden" name="productId" th:value="${product.id}">
                            <div class="flex items-center border border-gray-300 rounded-lg overflow-hidden">
                                <label for="quantity" class="sr-only">Quantidade</label>
                                <input type="number" id="quantity" name="quantity" value="1" min="1" max="20"
                                       class="w-16 text-center py-2.5 border-0 outline-none text-sm font-medium">
                            </div>
                            <button type="submit"
                                    class="flex-1 flex items-center justify-center gap-2 py-2.5 bg-snapdog-600 hover:bg-snapdog-700 text-white rounded-lg font-semibold transition-colors">
                                <i data-lucide="shopping-cart" class="w-4 h-4"></i>
                                Adicionar ao carrinho
                            </button>
                        </form>

                        <!-- Link para login (não autenticado) -->
                        <div sec:authorize="!hasRole('CUSTOMER')" class="space-y-3">
                            <a href="/login"
                               class="flex items-center justify-center gap-2 py-2.5 bg-snapdog-600 hover:bg-snapdog-700 text-white rounded-lg font-semibold transition-colors w-full">
                                <i data-lucide="log-in" class="w-4 h-4"></i>
                                Entrar para pedir
                            </a>
                            <p class="text-center text-sm text-gray-500">
                                Não tem conta?
                                <a href="/register" class="text-snapdog-600 font-semibold hover:text-snapdog-700">Cadastre-se</a>
                            </p>
                        </div>

                        <a href="/catalog" class="mt-4 flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 transition-colors">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i>
                            Voltar ao cardápio
                        </a>
                    </div>
                </div>

            </div>
        </div>

    </div>
</main>
</body>
</html>
